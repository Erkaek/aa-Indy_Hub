{% load i18n %}
<div class="modal fade bp-chat-modal bp-chat-shell" id="bpChatModal" tabindex="-1" aria-hidden="true" data-chat-modal>
    <div class="modal-dialog modal-dialog-scrollable modal-fullscreen-sm-down bp-chat-dialog">
        <div class="modal-content bp-chat-surface">
            <div class="modal-header bp-chat-header">
                <div class="bp-chat-header__title">
                    <span class="bp-chat-header__icon" aria-hidden="true"><i class="fas fa-comments"></i></span>
                    <span class="bp-chat-header__text">{% trans "Conditional offer chat" %}</span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{% trans 'Close' %}"></button>
            </div>

            <div class="modal-body bp-chat-body">
                <div class="bp-chat-summary" data-chat-summary></div>

                <div class="alert alert-warning d-none bp-chat-status" role="status" data-chat-status></div>

                <div class="bp-chat-actions d-none" data-chat-actions>
                    <div class="bp-chat-proposal">
                        <div class="bp-chat-proposal__summary">
                            <div class="bp-chat-proposal__intro">
                                <div class="small" data-chat-action-status></div>
                                <div class="bp-chat-proposal__hint" data-chat-action-hint></div>
                            </div>
                            <div class="bp-chat-proposal__current d-none" data-chat-proposal-current>
                                <span class="bp-chat-proposal__label">{% trans "Current proposal" %}</span>
                                <strong data-chat-proposal-amount></strong>
                            </div>
                        </div>
                        <form class="bp-chat-proposal-form" data-chat-proposal-form>
                            <label class="visually-hidden" for="bpChatProposal">{% trans "Proposal amount" %}</label>
                            <div class="input-group input-group-sm">
                                <input
                                    id="bpChatProposal"
                                    type="number"
                                    min="0"
                                    step="0.01"
                                    class="form-control"
                                    inputmode="decimal"
                                    placeholder="{% trans 'Enter amount in ISK' %}"
                                    data-chat-proposal-input
                                >
                                <span class="input-group-text">ISK</span>
                                <button type="submit" class="btn btn-primary" data-chat-proposal-submit>
                                    <i class="fas fa-coins me-1"></i>{% trans "Send proposal" %}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="bp-chat-message-list" data-chat-messages></div>
            </div>

            <div class="modal-footer bp-chat-footer">
                <form class="bp-chat-form" data-chat-form>
                    {% csrf_token %}
                    <label for="bpChatInput" class="visually-hidden">{% trans "Message" %}</label>
                    <textarea
                        id="bpChatInput"
                        class="form-control bp-chat-input"
                        rows="2"
                        maxlength="2000"
                        data-chat-input
                        placeholder="{% trans 'Type your message...' %}"
                        required
                    ></textarea>
                    <button type="submit" class="btn btn-primary bp-chat-send">
                        <i class="fas fa-paper-plane"></i>
                        <span class="d-none d-sm-inline ms-1">{% trans "Send" %}</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
