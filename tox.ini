[tox]
requires =
    tox>=4.2
env_list =
    py{312, 311, 310}

[testenv]
deps =
    allianceauth
    allianceauth-app-utils>=1
    coverage
    django-esi<10,>=8
    django-eveonline-sde>=0.0.1b3
    django-webtest
set_env =
    DJANGO_SETTINGS_MODULE = testauth.settings.local
commands =
    coverage run runtests.py --verbosity=2
    coverage report
    coverage xml
install_command = python -m pip install -U {opts} {packages}
